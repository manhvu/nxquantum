name: Release Dry Run

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-dry-run:
    name: release-dry-run
    runs-on: ubuntu-latest
    env:
      MIX_ENV: prod
      NXQ_ENABLE_EXLA: "0"
      NXQ_ENABLE_TORCHX: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.0"
          elixir-version: "1.19.1"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-release-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-release-
            ${{ runner.os }}-mix-

      - name: Install deps
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: CI quality gate
        env:
          MIX_ENV: test
        run: mix ci

      - name: Provider smoke lane
        env:
          MIX_ENV: test
        run: mix test.provider_smoke

      - name: Build package
        run: mix hex.build

      - name: Build docs
        run: mix docs.build

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nx-quantum-hex-tar
          path: "*.tar"

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: nx-quantum-docs
          path: doc
