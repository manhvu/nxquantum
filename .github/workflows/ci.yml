name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  core-ci:
    name: core-ci
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      NXQ_ENABLE_EXLA: "0"
      NXQ_ENABLE_TORCHX: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.0"
          elixir-version: "1.19.1"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-core-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-core-
            ${{ runner.os }}-mix-

      - name: Install deps
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Quality gate
        run: mix ci

      - name: Build package artifact
        run: mix hex.build

  exla-smoke:
    name: exla-smoke
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      NXQ_ENABLE_EXLA: "1"
      NXQ_ENABLE_TORCHX: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.0"
          elixir-version: "1.19.1"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-exla-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-exla-
            ${{ runner.os }}-mix-

      - name: Install deps
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Test
        run: |
          mix test
          mix test.features

  torchx-optional:
    name: torchx-optional
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      MIX_ENV: test
      NXQ_ENABLE_EXLA: "0"
      NXQ_ENABLE_TORCHX: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.0"
          elixir-version: "1.19.1"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-torchx-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-torchx-
            ${{ runner.os }}-mix-

      - name: Install deps
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Test
        run: mix test
